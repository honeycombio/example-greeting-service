plugins {
	id 'org.springframework.boot' version '2.4.1'
	id 'io.spring.dependency-management' version '1.0.10.RELEASE'
	id 'java'
}

group = 'io.honeycomb.examples'
version = '0.0.1-SNAPSHOT'
sourceCompatibility = '11'

repositories {
	mavenCentral()

	// this is only needed for local dev on the honey-flavored OTel SDK
	flatDir {	dirs System.getenv("SDK_DIR") }
}

dependencies {
	compile('io.opentelemetry:opentelemetry-api:1.0.0')
	compile('io.opentelemetry:opentelemetry-sdk:1.0.0')
	compile('io.opentelemetry:opentelemetry-exporter-otlp:1.0.0')
	compile('io.opentelemetry:opentelemetry-extension-annotations:1.0.0')
	compile("io.grpc:grpc-netty-shaded:1.34.1")

	implementation 'org.springframework.boot:spring-boot-starter-web'
	testImplementation('org.springframework.boot:spring-boot-starter-test') {
		exclude group: 'org.junit.vintage', module: 'junit-vintage-engine'
	}

	// this is gonna get a different name eventually
	implementation 'io.honeycomb:sdk-1.0-SNAPSHOT'
}

test {
	useJUnitPlatform()
}

task setEnvVars(type:Exec) { 
	environment 'SERVICE_NAME', 'year-service-java' 
	environment 'JAVA_TOOL_OPTIONS', '-javaagent:${AGENT_PATH}'
	}
