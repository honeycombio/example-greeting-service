apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-python
  labels:
    app: frontend
    language: python
spec:
  selector:
    matchLabels:
      app: frontend
      language: python
  template:
    metadata:
      labels:
        app: frontend
        language: python
    spec:
      containers:
      - name: frontend-python
        image: hnyexample/frontend-python
        ports:
        - containerPort: 7000
        env:
          - name: HONEYCOMB_API_KEY
            valueFrom:
              configMapKeyRef:
                name: hny-config
                key: api_key
          - name: HONEYCOMB_DATASET
            valueFrom:
              configMapKeyRef:
                name: hny-config
                key: dataset
          - name: SERVICE_NAME
            value: frontend-python
          - name: NAME_ENDPOINT
            value: http://name
          - name: MESSAGE_ENDPOINT
            value: http://message
