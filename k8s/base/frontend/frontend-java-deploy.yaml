apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-java
  labels:
    app: frontend
    language: java
spec:
  selector:
    matchLabels:
      app: frontend
      language: java
  template:
    metadata:
      labels:
        app: frontend
        language: java
    spec:
      containers:
      - name: frontend-java
        image: hnyexample/frontend-java
        ports:
        - containerPort: 7000
        env:
          - name: HONEYCOMB_API_KEY
            valueFrom:
              configMapKeyRef:
                name: hny-config
                key: api_key
          - name: HONEYCOMB_DATASET
            valueFrom:
              configMapKeyRef:
                name: hny-config
                key: dataset
          - name: SERVICE_NAME
            value: frontend-java
          - name: NAME_ENDPOINT
            value: http://gateway
          - name: MESSAGE_ENDPOINT
            value: http://gateway
          - name: OTEL_METRICS_EXPORTER
            value: none


---
apiVersion: v1
kind: Service
metadata:
  name: frontend-java
spec:
  selector:
    app: frontend
    language: java
  ports:
    - port: 7000
      targetPort: 7000
      protocol: TCP
