apiVersion: apps/v1
kind: Deployment
metadata:
  name: name-java
  labels:
    app: name
    language: java
spec:
  selector:
    matchLabels:
      app: name
      language: java
  template:
    metadata:
      labels:
        app: name
        language: java
    spec:
      containers:
      - name: name-java
        image: hnyexample/name-java
        ports:
        - containerPort: 8000
        env:
        - name: HONEYCOMB_API_KEY
          valueFrom:
            configMapKeyRef:
              name: hny-config
              key: api_key
        - name: HONEYCOMB_DATASET
          valueFrom:
            configMapKeyRef:
              name: hny-config
              key: dataset
        - name: SERVICE_NAME
          value: name-java
        - name: YEAR_ENDPOINT
          value: http://gateway
        - name: OTEL_METRICS_EXPORTER
          value: none

---
apiVersion: v1
kind: Service
metadata:
  name: name-java
spec:
  selector:
    app: name
    language: java
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
