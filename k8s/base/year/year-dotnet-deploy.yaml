apiVersion: apps/v1
kind: Deployment
metadata:
  name: year-dotnet
  labels:
    app: year
    language: dotnet
spec:
  selector:
    matchLabels:
      app: year
      language: dotnet
  template:
    metadata:
      labels:
        app: year
        language: dotnet
    spec:
      containers:
      - name: year-dotnet
        image: hnyexample/year-dotnet
        ports:
        - containerPort: 6001
        env:
        - name: Otlp__Endpoint
          value: "http://collector:55680"

---
apiVersion: v1
kind: Service
metadata:
  name: year-dotnet
spec:
  selector:
    app: year
    language: dotnet
  ports:
    - protocol: TCP
      port: 6001
      targetPort: 6001
