apiVersion: apps/v1
kind: Deployment
metadata:
  name: year-java
  labels:
    app: year
    language: java
spec:
  selector:
    matchLabels:
      app: year
      language: java
  template:
    metadata:
      labels:
        app: year
        language: java
    spec:
      containers:
      - name: year-java
        image: hnyexample/year-java
        ports:
        - containerPort: 6001
        env:
        - name: HONEYCOMB_API_KEY
          valueFrom:
            configMapKeyRef:
              name: hny-config
              key: api_key
        - name: HONEYCOMB_DATASET
          valueFrom:
            configMapKeyRef:
              name: hny-config
              key: dataset
        - name: SERVICE_NAME
          value: year-java
        - name: OTEL_METRICS_EXPORTER
          value: none

---
apiVersion: v1
kind: Service
metadata:
  name: year-java
spec:
  selector:
    app: year
    language: java
  ports:
    - protocol: TCP
      port: 6001
      targetPort: 6001
