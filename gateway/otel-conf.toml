exporter = "otlp"
processor = "batch"

[exporters.otlp]
host = "collector"
port = 55680

[processors.batch]
max_queue_size = 2048
schedule_delay_millis = 5000
max_export_batch_size = 512

[service]
name = "gateway" # Opentelemetry resource name

[sampler]
name = "AlwaysOff" # Also: AlwaysOff, TraceIdRatioBased
ratio = 1.0
parent_based = false
